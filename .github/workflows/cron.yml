name: cron

on:
  workflow_dispatch:
  schedule:
    # Cron job every monday
    # https://crontab.guru/every-monday
    - cron: '0 0 * * MON'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: true
      - name: Update
        run: |
          git config --global user.email ${{ secrets.GIT_EMAIL }}
          git config --global user.name ${{ secrets.GIT_USERNAME }}
          node scripts/fetch-providers.js
          git add src/providers.json
          git diff-index --quiet HEAD || git commit -m 'build(update): providers' --no-verify
          git push origin ${{ github.head_ref }} || true
